<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Smart supply chain real-time logistics dashboard.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Logistics Risk Monitor">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>Logistics Risk Monitor</title>
  <link rel="manifest" href="manifest.json">
  <!-- Replace the key below before running Flutter Web with Google Maps. -->
  <script>
    (function() {
      // 1. Try to load from local config first (for local development)
      // 2. Fallback to placeholder (for GitHub build injection)
      const placeholder = "{{GOOGLE_MAPS_API_KEY}}";
      
      function loadMaps(key) {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${key}`;
        document.head.appendChild(script);
      }

      fetch('maps_config.json')
        .then(response => response.json())
        .then(config => {
          console.log('📍 Loading Google Maps with local config');
          loadMaps(config.key);
        })
        .catch(() => {
          if (!placeholder.startsWith('{{')) {
            console.log('📍 Loading Google Maps with production key');
            loadMaps(placeholder);
          } else {
            console.error('❌ Google Maps API Key missing! Check local maps_config.json or GitHub Secrets.');
          }
        });
    })();
  </script>
</head>

<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
