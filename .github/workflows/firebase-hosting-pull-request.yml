name: 🚀 Deploy to Firebase Hosting (PR Preview)

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Flutter (LATEST STABLE)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true   # speeds up builds

      # Enable web
      - name: Enable Flutter Web
        run: flutter config --enable-web

      # Verify versions (prevents silent failures)
      - name: Check Flutter Version
        run: flutter --version

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      # Inject API Key
      - name: Inject Google Maps API Key
        run: sed -i 's|YOUR_API_KEY_HERE|${{ secrets.GOOGLE_MAPS_API_KEY }}|g' frontend/web/index.html

      # Build
      - name: Build Flutter Web
        working-directory: frontend
        run: flutter build web --release

      # Deploy preview
      - name: Deploy Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SSM_SB }}
          projectId: ssm-sb
          # Optional but recommended:
          expires: 7d