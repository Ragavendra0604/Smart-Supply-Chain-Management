name: 🚀 Build & Deploy Flutter Web to Firebase

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install Flutter (LATEST STABLE)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Enable web support
      - name: Enable Flutter Web
        run: flutter config --enable-web

      # Verify versions (debug safety)
      - name: Check Flutter & Dart version
        run: |
          flutter --version
          dart --version

      # Install dependencies
      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      # Inject Google Maps API Key securely
      - name: Inject Google Maps API Key
        run: sed -i 's|{{GOOGLE_MAPS_API_KEY}}|${{ secrets.GOOGLE_MAPS_API_KEY }}|g' frontend/web/index.html

      # Build Flutter Web
      - name: Build Flutter Web
        working-directory: frontend
        run: flutter build web --release

      # Deploy to Firebase Hosting
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SSM_SB }}
          channelId: live
          projectId: ssm-sb